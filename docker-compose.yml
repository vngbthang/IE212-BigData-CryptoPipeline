# ============================================================================
# REAL-TIME CRYPTO DATA PIPELINE - DOCKER COMPOSE (FINAL MERGE)
# Medallion Architecture: Bronze (Kafka) → Silver (Spark) → Gold (Postgres)
# ============================================================================

services:

  # Coordination Service
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Brokers
  kafka-0:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka-0
    hostname: kafka-0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 0
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-0:9092,PLAINTEXT_HOST://kafka-0:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    volumes:
      - kafka-0-data:/var/lib/kafka/data
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server=localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-1:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka-1
    hostname: kafka-1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9092"
      - "29093:29093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,PLAINTEXT_HOST://kafka-1:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    networks:
      - crypto-network

  kafka-2:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka-2
    hostname: kafka-2
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9094:9092"
      - "29094:29094"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092,PLAINTEXT_HOST://kafka-2:29094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    networks:
      - crypto-network

  # Hadoop HDFS
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      CLUSTER_NAME: "crypto-cluster"
      CORE_SITE_XML_hadoop_tmp_dir: /hadoop/tmp
      HDFS_CONF_dfs_namenode_name_dir: file:///hadoop/dfs/name
      HDFS_CONF_dfs_datanode_data_dir: file:///hadoop/dfs/data
      HDFS_CONF_dfs_replication: 2
    volumes:
      - namenode-data:/hadoop/dfs/name
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 10s
      timeout: 5s
      retries: 5

  datanode-1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode-1
    hostname: datanode-1
    depends_on:
      namenode:
        condition: service_healthy
    ports:
      - "9864:9864"
    environment:
      SERVICE_PRECONDITION: "namenode:9000"
      CORE_SITE_XML_hadoop_tmp_dir: /hadoop/tmp
      HDFS_CONF_dfs_datanode_data_dir: file:///hadoop/dfs/data
      HDFS_CONF_dfs_replication: 2
    volumes:
      - datanode-1-data:/hadoop/dfs/data
    networks:
      - crypto-network

  datanode-2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode-2
    hostname: datanode-2
    depends_on:
      namenode:
        condition: service_healthy
    ports:
      - "9865:9865"
    environment:
      SERVICE_PRECONDITION: "namenode:9000"
      CORE_SITE_XML_hadoop_tmp_dir: /hadoop/tmp
      HDFS_CONF_dfs_datanode_data_dir: file:///hadoop/dfs/data
      HDFS_CONF_dfs_replication: 2
    volumes:
      - datanode-2-data:/hadoop/dfs/data
    networks:
      - crypto-network

  # Spark Cluster
  spark-master:
    build:
      context: .
      dockerfile: docker/Dockerfile.spark
    container_name: spark-master
    hostname: spark-master
    user: "root"
    depends_on:
      - kafka-0
      - namenode
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    volumes:
      - ./src:/app/src
    networks:
      - crypto-network
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "spark-master", "--port", "7077", "--webui-port", "8080"]

  spark-worker-1:
    build:
      context: .
      dockerfile: docker/Dockerfile.spark
    container_name: spark-worker-1
    hostname: spark-worker-1
    user: "root"
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    volumes:
      - ./src:/app/src
    networks:
      - crypto-network
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077", "--webui-port", "8081", "--cores", "2", "--memory", "1g"]

  spark-worker-2:
    build:
      context: .
      dockerfile: docker/Dockerfile.spark
    container_name: spark-worker-2
    hostname: spark-worker-2
    depends_on:
      - spark-master
    ports:
      - "8082:8082"
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_WEBUI_PORT: 8082
    volumes:
      - spark-worker-2-data:/bitnami/spark
      - ./src:/app/src
    networks:
      - crypto-network

  # Storage Layer (Gold)
  postgres:
    image: postgres:12-alpine
    container_name: postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cryptopipeline
      POSTGRES_USER: crypto_user
      POSTGRES_PASSWORD: crypto_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    command: ["postgres", "-c", "max_connections=200", "-c", "shared_buffers=256MB", "-c", "wal_level=logical"]
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto_user -d cryptopipeline"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Orchestration Layer
  airflow-init:
    image: apache/airflow:2.3.0-python3.9
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://crypto_user:crypto_password@postgres:5432/cryptopipeline
    networks:
      - crypto-network
    entrypoint: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"

  airflow-webserver:
    image: apache/airflow:2.3.0-python3.9
    container_name: airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8888:8080"
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://crypto_user:crypto_password@postgres:5432/cryptopipeline
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    volumes:
      - ./src/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow-logs:/opt/airflow/logs
    networks:
      - crypto-network
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.3.0-python3.9
    container_name: airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://crypto_user:crypto_password@postgres:5432/cryptopipeline
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    volumes:
      - ./src/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow-logs:/opt/airflow/logs
    networks:
      - crypto-network
    command: scheduler

  # Ingestion Layer (Bronze) - Khôi's Split logic
  producer-mock:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: crypto-producer-mock
    profiles: ["dev"]
    depends_on:
      - kafka-0
    environment:
      KAFKA_BROKERS: kafka-0:9092,kafka-1:9092,kafka-2:9092
      KAFKA_TOPIC: crypto_ticks
      CRYPTO_MODE: "dev"
    volumes:
      - ./src/producer:/app
      - ./logs:/app/logs
    networks:
      - crypto-network
    command: python /app/producer.py

  producer-coinbase:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: crypto-producer-coinbase
    profiles: ["prod"]
    depends_on:
      - kafka-0
    environment:
      KAFKA_BROKERS: kafka-0:9092,kafka-1:9092,kafka-2:9092
      KAFKA_TOPIC: crypto_ticks
      CRYPTO_MODE: "prod"
    volumes:
      - ./src/ingestion:/app
      - ./logs:/app/logs
    networks:
      - crypto-network
    command: python /app/producer.py

  # Visualization Layer (Gold)
  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    container_name: crypto-dashboard
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cryptopipeline
      DB_USER: crypto_user
      DB_PASSWORD: crypto_password
    volumes:
      - ./src/dashboard:/app/dashboard
    networks:
      - crypto-network
    command: streamlit run /app/dashboard/app.py --server.port=8501

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-0-data:
  kafka-1-data:
  kafka-2-data:
  namenode-data:
  datanode-1-data:
  datanode-2-data:
  spark-worker-2-data:
  postgres-data:
  airflow-logs:
  airflow-plugins:
  streamlit-cache:

networks:
  crypto-network:
    driver: bridge